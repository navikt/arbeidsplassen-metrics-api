name: deploy-prod
run-name: deploy-prod ${{ inputs.version || github.event.release.tag_name }}
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy (for example: 26.061.102232)'
        required: true
        type: string
  release:
    types: [published]

jobs:
  call-workflow:
    uses: navikt/pam-deploy/.github/workflows/deploy-prod.yml@v7
    permissions:
      contents: write
      id-token: write
    with:
      TEAM: arbeidsplassen
      NAIS_RESOURCE: .nais/nais.yaml
      NAIS_VARS: .nais/prod.yaml
      VERSION_TAG: ${{ inputs.version }}